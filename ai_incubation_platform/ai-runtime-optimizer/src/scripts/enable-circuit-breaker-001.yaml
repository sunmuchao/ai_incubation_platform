# 启用熔断器 - 启用服务熔断器
script_id: enable-circuit-breaker-001
name: 启用熔断器
description: 启用服务熔断器，防止级联故障
category: config_adjustment
target_type: service
risk_level: medium
timeout_seconds: 60

parameters:
  - name: service_name
    type: string
    default: ""
    description: 服务名称
  - name: failure_threshold
    type: integer
    default: 5
    description: 失败阈值
  - name: recovery_timeout
    type: integer
    default: 30
    description: 恢复超时时间（秒）
  - name: half_open_requests
    type: integer
    default: 3
    description: 半开状态测试请求数

script_content: |
  #!/bin/bash
  set -e

  SERVICE_NAME="{{service_name}}"
  FAILURE_THRESHOLD="{{failure_threshold}}"
  RECOVERY_TIMEOUT="{{recovery_timeout}}"
  HALF_OPEN_REQUESTS="{{half_open_requests}}"

  echo "=== 启用熔断器 ==="
  echo "服务：$SERVICE_NAME"
  echo "失败阈值：$FAILURE_THRESHOLD"
  echo "恢复超时：${RECOVERY_TIMEOUT}s"

  # 检查服务是否存在
  if ! systemctl list-units --type=service --all | grep -q "$SERVICE_NAME"; then
    echo "错误：服务 $SERVICE_NAME 不存在"
    exit 1
  fi

  # 检查服务是否有熔断器端点
  HEALTH_URL="http://localhost/actuator/circuitbreakers"

  # 尝试通过 Actuator 端点配置（Spring Boot）
  echo "尝试通过 Actuator 端点配置..."

  # 配置熔断器
  CONFIG_DATA="{
    \"failureRateThreshold\": $FAILURE_THRESHOLD,
    \"slowCallRateThreshold\": 100,
    \"slowCallDurationThreshold\": 2000,
    \"permittedNumberOfCallsInHalfOpenState\": $HALF_OPEN_REQUESTS,
    \"waitDurationInOpenState\": $RECOVERY_TIMEOUT,
    \"minimumNumberOfCalls\": 5
  }"

  echo "熔断器配置：$CONFIG_DATA"

  # 如果服务有配置端点，发送配置
  if curl -sf "http://localhost/actuator" > /dev/null 2>&1; then
    curl -X POST "http://localhost/actuator/circuitbreakers/config" \
      -H "Content-Type: application/json" \
      -d "$CONFIG_DATA" 2>/dev/null || echo "无法通过 Actuator 配置"
  fi

  # 更新服务配置
  CONFIG_DIR="/etc/$SERVICE_NAME"
  if [ -d "$CONFIG_DIR" ]; then
    CONFIG_FILE="$CONFIG_DIR/circuitbreaker.properties"
    cat > "$CONFIG_FILE" << EOF
  # 熔断器配置
  # Generated by AI Runtime Optimizer
  circuit.breaker.failure.threshold=$FAILURE_THRESHOLD
  circuit.breaker.recovery.timeout=$RECOVERY_TIMEOUT
  circuit.breaker.half.open.requests=$HALF_OPEN_REQUESTS
  EOF
    echo "配置文件已更新：$CONFIG_FILE"
  fi

  # 热重载配置
  echo "重载配置..."
  if curl -sf "http://localhost/actuator/refresh" > /dev/null 2>&1; then
    curl -X POST "http://localhost/actuator/refresh"
    echo "配置已热重载"
  else
    echo "服务不支持热重载，需要重启服务"
    systemctl restart "$SERVICE_NAME"
  fi

  echo "=== 熔断器启用完成 ==="

verification_steps:
  - name: service_active
    check: systemctl is-active {{service_name}}
    expected: active
    timeout: 10

  - name: circuit_breaker_status
    check: curl -sf http://localhost/actuator/circuitbreakers
    expected: "circuitBreakers"
    timeout: 30

rollback_script: |
  #!/bin/bash
  # 恢复默认熔断器配置
  CONFIG_DIR="/etc/{{service_name}}"
  CONFIG_FILE="$CONFIG_DIR/circuitbreaker.properties"

  if [ -f "$CONFIG_FILE" ]; then
    rm "$CONFIG_FILE"
    echo "已删除熔断器配置文件"

    # 重载配置
    curl -X POST "http://localhost/actuator/refresh" 2>/dev/null || true
    echo "配置已恢复"
  else
    echo "未找到熔断器配置文件"
  fi

version: 1.0.0
author: system
tags:
  - circuit_breaker
  - resilience
  - config
enabled: true
