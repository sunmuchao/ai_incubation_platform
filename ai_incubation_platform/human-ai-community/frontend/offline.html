<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3d9cf5" />
  <title>离线 - Human-AI Community</title>
  <style>
    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a2332;
      --text-primary: #e8ecf1;
      --text-secondary: #9aa8b8;
      --accent-primary: #3d9cf5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(0.95);
      }
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .retry-btn:hover {
      background: #5ba3f7;
      transform: translateY(-2px);
    }

    .tips {
      margin-top: 2rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 10px;
      text-align: left;
    }

    .tips h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .tips ul {
      list-style: none;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .tips li {
      padding: 0.25rem 0;
    }

    .tips li::before {
      content: '✓ ';
      color: var(--accent-primary);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>网络连接已断开</h1>
    <p>您目前处于离线状态，请检查网络连接后重试。</p>

    <button class="retry-btn" onclick="window.location.reload()">
      <span>🔄</span> 重新连接
    </button>

    <div class="tips">
      <h3>💡 小提示</h3>
      <ul>
        <li>部分缓存内容仍可浏览</li>
        <li>已收藏的内容可在离线时查看</li>
        <li>恢复网络后会自动同步数据</li>
      </ul>
    </div>
  </div>

  <script>
    // 监听网络状态恢复
    window.addEventListener('online', () => {
      if (navigator.onLine) {
        document.querySelector('.offline-icon').textContent = '✅';
        document.querySelector('h1').textContent = '网络已恢复';
        document.querySelector('p').textContent = '正在重新加载页面...';
        setTimeout(() => window.location.reload(), 1000);
      }
    });

    // 显示当前网络状态
    console.log('在线状态:', navigator.onLine);
  </script>
</body>
</html>
