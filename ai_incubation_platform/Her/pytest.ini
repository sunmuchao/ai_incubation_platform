[pytest]
# 测试路径
testpaths = tests
pythonpath = src

# 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = -v --tb=short --strict-markers -p no:timeout

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API 测试
    isolated: 需要独立数据库的测试

# 日志配置
log_cli = true
log_cli_level = INFO

# 排除 legacy 测试目录（引用已删除的 API 模块）
# 排除父目录中的其他项目测试
norecursedirs = src/test/p10 src/test/p11 src/test/p12 tests/behavior_lab_tests tests/relationship_enhancement_tests tests/emotion_analysis_tests tests/milestone_tests .git ../deerflow ../agent-platform-core ../ai-code-understanding ../ai-community-buying ../ai-employee-platform ../ai-hires-human ../ai-opportunity-miner ../ai-physical-Retail-operations-agent ../ai-runtime-optimizer ../ai-traffic-booster ../data-agent-connector ../frontend ../human-ai-community ../platform-portal

# xdist 配置（并行测试）
# 默认使用4个worker，按模块分组

