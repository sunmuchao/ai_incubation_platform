[pytest]
# 测试路径
testpaths = src/test/__tests__
pythonpath = src

# 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = -v --tb=short --strict-markers --cov=src/services --cov-report=term-missing --cov-report=html:htmlcov

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API 测试

# 日志配置
log_cli = true
log_cli_level = INFO

# 超时设置（秒）
timeout = 60

# 排除 p10/p11/p12 目录，因为它们使用独立的测试配置
norecursedirs = src/test/p10 src/test/p11 src/test/p12

