# ============================================================
# Her 意图路由配置 - 简化版 v2.0
# ============================================================
#
# 核心改动：
# - 减少意图类型（从 15 个减到 7 个核心意图）
# - 直接映射到 DeerFlow 工具（砍掉中间 Skill 层）
# - 简化关键词匹配
#
# ============================================================

intents:
  # -------------------- 核心意图（直接调用 DeerFlow 工具）--------------------

  - name: matching
    description: "找对象/匹配"
    keywords:
      - "找人"
      - "匹配"
      - "找对象"
      - "推荐"
      - "相亲"
      - "介绍对象"
    priority: 1
    deerflow_tool: her_find_matches  # 直接调用 DeerFlow 工具
    is_local: false
    response_template: "好的，我来帮你找合适的对象~"

  - name: icebreaker
    description: "破冰/开场白"
    keywords:
      - "破冰"
      - "开场"
      - "怎么开场"
      - "聊什么"
      - "怎么聊"
      - "第一句话"
    priority: 2
    deerflow_tool: her_get_icebreaker
    is_local: false
    response_template: "好的，我来帮你想一个好的开场方式~"

  - name: compatibility_analysis
    description: "匹配度分析"
    keywords:
      - "合适吗"
      - "匹配度"
      - "我们配吗"
      - "分析一下"
      - "合不合适"
    priority: 3
    deerflow_tool: her_analyze_compatibility
    is_local: false
    response_template: "好的，我来分析你们的匹配度~"

  - name: date_planning
    description: "约会策划"
    keywords:
      - "约会去哪"
      - "约会地点"
      - "约会方案"
      - "见面地点"
    priority: 4
    deerflow_tool: her_plan_date
    is_local: false
    response_template: "好的，我来帮你策划约会~"

  - name: profile_collection
    description: "完善资料"
    keywords:
      - "完善资料"
      - "填信息"
      - "补充信息"
    priority: 5
    deerflow_tool: her_collect_profile
    is_local: false
    response_template: "好的，我来帮你完善资料~"

  # -------------------- 本地意图（不调用工具）--------------------

  - name: greeting
    description: "问候"
    keywords:
      - "你好"
      - "hi"
      - "hello"
      - "嗨"
    priority: 10
    is_local: true
    response_template: "你好呀！我是 Her，你的婚恋助手。有什么可以帮你的吗？"

  - name: general
    description: "通用对话（兜底）"
    keywords: []
    priority: 99
    is_local: true
    response_template: "我在这里，有什么需要帮忙的吗？你可以问我：找对象、聊什么、约会去哪..."

# ============= 能力介绍 =============

capability_intro: "我是 Her，你的智能婚恋助手。我可以帮你找对象、推荐开场白、分析匹配度、策划约会。"

feature_list:
  - name: "智能匹配"
    description: "基于你的偏好，智能推荐合适的对象"
  - name: "破冰建议"
    description: "不知道怎么开场？我来帮你想开场白"
  - name: "匹配度分析"
    description: "分析你和TA的匹配度，给你建议"
  - name: "约会策划"
    description: "帮你策划约会方案，选地点选活动"

# ============= 元数据 =============

metadata:
  version: "2.0.0"
  last_updated: "2025-04-15"
  description: "简化版意图配置，直接映射到 DeerFlow 工具"