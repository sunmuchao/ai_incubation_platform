  - name: "AI 预沟通"
    description: "AI 替身先聊 50 句，帮你判断是否合适"
  - name: "话题推荐"
    description: "不知道聊什么？我来推荐话题"
  - name: "关系分析"
    description: "分析你的关系健康度，给出建议"
  - name: "约会策划"
    description: "帮你策划约会方案，选地点选活动"

